<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信男藥局 庫存盤點系統</title>
<style>
body {font-family: sans-serif; background:#f5f5f5; margin:0;}
.container {padding:20px;}
.card {
  background:#fff;
  border-radius:10px;
  padding:15px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}
.sku {font-weight:bold; color:#2563eb;}
.name {font-size:16px;}
.loading {text-align:center; padding:40px; color:#888;}
</style>
</head>

<body>
<div class="container">
  <h2>信男藥局 庫存盤點系統</h2>
  <div id="productList" class="loading">正在載入商品資料...</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwH3bfQflt64qExA5ZJZFbA4C9egcwPsjfTSS_d0eEcK2s5i7zv3K9V-PBXzmCMpFI/exec";

async function loadProducts() {
  try {
    const res = await fetch(API + "?action=searchProducts");
    const data = await res.json();

    if (!data || !data.length) {
      document.getElementById("productList").innerHTML = "⚠️ 沒有商品資料";
      return;
    }

    const html = data.map(item => `
      <div class="card">
        <div class="sku">${item.sku || ""}</div>
        <div class="name">${item.product_name || ""}</div>
        <div>庫存：${item.stock_total || 0}</div>
        <div>效期：${item.expiry || "未設定"}</div>
      </div>
    `).join("");

    document.getElementById("productList").innerHTML = html;

  } catch (err) {
    document.getElementById("productList").innerHTML =
      "❌ 無法載入資料<br>" + err.message;
  }
}

loadProducts();
</script>

</body>
</html>
